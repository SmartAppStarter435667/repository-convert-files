<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Star List Manager</title>

<style>
body { font-family: sans-serif; padding: 20px; }
input, button { width: 100%; padding: 10px; margin: 5px 0; }
.repo { border-bottom: 1px solid #eee; padding: 5px; }
.list-box { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h2>スター + カスタムリスト</h2>

<input id="username" placeholder="username">
<button onclick="fetchStars()">スター取得</button>

<h3>リスト作成</h3>
<input id="listName" placeholder="リスト名">
<input id="keyword" placeholder="フィルタ（例: react, ai）">
<button onclick="createList()">リスト作成</button>

<div>総数: <span id="count">0</span></div>

<h3>リスト一覧</h3>
<div id="lists"></div>

<script>
let allRepos = [];
let lists = {};

async function fetchStars() {
  const username = document.getElementById("username").value;

  let page = 1;
  allRepos = [];

  while (true) {
    const res = await fetch(
      `https://api.github.com/users/${username}/starred?per_page=100&page=${page}`
    );

    const data = await res.json();
    if (!data.length) break;

    allRepos = allRepos.concat(data);
    page++;
  }

  document.getElementById("count").innerText = allRepos.length;
}

function createList() {
  const name = document.getElementById("listName").value;
  const keyword = document.getElementById("keyword").value.toLowerCase();

  const filtered = allRepos.filter(r =>
    r.full_name.toLowerCase().includes(keyword) ||
    (r.description || "").toLowerCase().includes(keyword)
  );

  lists[name] = filtered;

  renderLists();
}

function renderLists() {
  const el = document.getElementById("lists");
  el.innerHTML = "";

  Object.keys(lists).forEach(name => {
    const box = document.createElement("div");
    box.className = "list-box";

    box.innerHTML = `<h4>${name} (${lists[name].length})</h4>`;

    lists[name].forEach(r => {
      box.innerHTML += `
        <div class="repo">
          <a href="${r.html_url}" target="_blank">${r.full_name}</a>
        </div>
      `;
    });

    el.appendChild(box);
  });
}
</script>

</body>
</html>
