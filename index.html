<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Star Exporter</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; }
    textarea { width: 100%; height: 200px; }
  </style>
</head>
<body>

<h2>GitHub スター付きリポジトリURL抽出</h2>

<label>GitHub Username</label>
<input id="username" placeholder="例: torvalds" />

<label>Personal Access Token（任意）</label>
<input id="token" placeholder="API制限回避用" />

<button onclick="fetchStars()">取得</button>
<button onclick="downloadFile()">ダウンロード</button>

<textarea id="output" placeholder="ここにURL一覧が表示されます"></textarea>

<script>
async function fetchStars() {
  const username = document.getElementById("username").value;
  const token = document.getElementById("token").value;

  let page = 1;
  let urls = [];

  while (true) {
    const res = await fetch(
      `https://api.github.com/users/${username}/starred?per_page=100&page=${page}`,
      {
        headers: token ? { Authorization: "token " + token } : {}
      }
    );

    const data = await res.json();
    if (!data.length) break;

    data.forEach(repo => {
      urls.push(repo.html_url);
    });

    page++;
  }

  document.getElementById("output").value = urls.join("\n");
}

function downloadFile() {
  const content = document.getElementById("output").value;
  const blob = new Blob([content], { type: "text/plain" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "github_stars.txt";
  a.click();
}
</script>

</body>
  </html>
