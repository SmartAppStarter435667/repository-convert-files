<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Star Manager Pro</title>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --accent: #38bdf8;
}

body {
  margin: 0;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 16px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

input {
  background: #334155;
  color: white;
}

button {
  background: var(--accent);
  color: black;
  font-weight: bold;
}

button:active {
  opacity: 0.8;
}

.status {
  margin-top: 10px;
  font-size: 14px;
}

.count {
  font-size: 18px;
  margin-top: 10px;
}

.list {
  margin-top: 15px;
}

.card {
  background: var(--card);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card a {
  color: var(--accent);
  text-decoration: none;
  font-weight: bold;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

.loader {
  margin-top: 10px;
}

@media (min-width: 768px) {
  .container {
    max-width: 800px;
  }
}
</style>
</head>

<body>
<div class="container">

<h2>GitHub Star Manager</h2>

<input id="username" placeholder="GitHub Username">
<input id="token" placeholder="Token（任意）">

<button onclick="fetchStars()">スター取得</button>
<button onclick="download()">ダウンロード</button>

<div class="status" id="status"></div>
<div class="count">取得数: <span id="count">0</span></div>

<div class="list" id="list"></div>

</div>

<script>
let repos = [];

async function fetchStars() {
  const username = document.getElementById("username").value.trim();
  const token = document.getElementById("token").value.trim();

  if (!username) {
    alert("ユーザー名を入力してください");
    return;
  }

  repos = [];
  let page = 1;
  let loading = true;

  document.getElementById("list").innerHTML = "";
  updateStatus("取得中...");

  try {
    while (loading) {
      const res = await fetch(
        `https://api.github.com/users/${username}/starred?per_page=100&page=${page}`,
        {
          headers: token ? { Authorization: "token " + token } : {}
        }
      );

      if (!res.ok) {
        throw new Error(`API Error: ${res.status}`);
      }

      const data = await res.json();

      if (!data.length) {
        loading = false;
        break;
      }

      repos.push(...data);
      renderChunk(data);

      updateStatus(`取得中... ${repos.length}件`);
      page++;
    }

    document.getElementById("count").innerText = repos.length;
    updateStatus("完了");
  } catch (e) {
    updateStatus("エラー: " + e.message);
  }
}

function renderChunk(chunk) {
  const list = document.getElementById("list");

  chunk.forEach(r => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <a href="${r.html_url}" target="_blank">${r.full_name}</a>
      <div class="small">
        ⭐ ${r.stargazers_count} / ${r.language || "N/A"}
      </div>
    `;

    list.appendChild(div);
  });
}

function updateStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function download() {
  const urls = repos.map(r => r.html_url).join("\n");
  const blob = new Blob([urls], { type: "text/plain" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "stars.txt";
  a.click();
}
</script>

</body>
  </html>
